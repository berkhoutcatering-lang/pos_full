# Hop & Bites POS — TLS terminatie voor de lokale web-app.
# De Next.js standalone server luistert alleen op 127.0.0.1:3000; nginx
# serveert hem op 443 met het door pos-provision.sh gegenereerde
# certificaat (zelfde CA als pi-bridge — één hopbites-ca.crt op de tablets).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    return 301 https://$host$request_uri;
}

server {
    # bookworm ships nginx 1.22 — http2 still goes on the listen line.
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name _;

    ssl_certificate     /etc/pi-bridge/tls/cert.pem;
    ssl_certificate_key /etc/pi-bridge/tls/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 10m;

    # Next static chunks are content-hashed; let nginx serve them straight
    # from disk with long cache headers.
    location /_next/static/ {
        alias /opt/pos-web/apps/web/.next/static/;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 75s;
    }
}
